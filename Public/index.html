<!DOCTYPE html>
<html>
<head>
<title>Revisor</title>
</head>
<body>
<h1>Revisor Academico Q1</h1>
<input type="file" id="f">
<button onclick="s()">Revisar</button>
<textarea id="o" style="width:100%;height:300px"></textarea>
<script>
async function s(){
var form=new FormData();
form.append('documento',document.getElementById('f').files[0]);
var r=await fetch('/revisar',{method:'POST',body:form});
var d=await r.json();
document.getElementById('o').value=d.textoFinal;
}
</script>
</body>
</html>
