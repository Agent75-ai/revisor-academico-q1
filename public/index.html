<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Revisor Q1</title>
<style>
body { font-family: Arial; margin: 0; padding: 20px; background: #f5f7fa; }
.container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
h1 { color: #667eea; }
input { padding: 8px; margin: 10px 0; }
button { padding: 10px 20px; background: #667eea; color: white; border: none; cursor: pointer; border-radius: 4px; }
button:disabled { opacity: 0.5; }
textarea { width: 100%; height: 300px; margin-top: 20px; padding: 10px; }
</style>
</head>
<body>
<div class="container">
<h1>Revisor Academico Q1</h1>
<p>Safety Management - HRO - Risk Governance</p>
<input type="file" id="file" accept=".docx,.md,.txt">
<button id="btn" onclick="revisar()" disabled>Iniciar</button>
<div id="progress" style="display:none">Procesando...</div>
<div id="results" style="display:none">
<p>Iteraciones: <b id="iter">-</b> | Puntaje: <b id="score">-</b>/100</p>
<div id="history"></div>
<textarea id="text" readonly></textarea>
<button onclick="download()">Descargar</button>
</div>
</div>
<script>
var file = document.getElementById('file');
var btn = document.getElementById('btn');
var datos = null;
file.onchange = function() { btn.disabled = !file.files[0]; };
async function revisar() {
var form = new FormData();
form.append('documento', file.files[0]);
document.getElementById('progress').style.display = 'block';
btn.disabled = true;
try {
var res = await fetch('/revisar', {method: 'POST', body: form});
var data = await res.json();
if (data.exito) {
datos = data;
document.getElementById('results').style.display = 'block';
document.getElementById('iter').textContent = data.iteraciones;
document.getElementById('score').textContent = data.puntaje;
document.getElementById('text').value = data.textoFinal;
document.getElementById('history').innerHTML = data.historial.length + ' iteraciones procesadas';
}
} catch (e) {
alert('Error: ' + e);
}
document.getElementById('progress').style.display = 'none';
btn.disabled = false;
}
function download() {
var blob = new Blob([document.getElementById('text').value], {type: 'text/plain'});
var url = URL.createObjectURL(blob);
var a = document.createElement('a');
a.href = url;
a.download = 'revision.txt';
a.click();
}
</script>
</body>
</html>
